services:
  postgres:
    image: postgres:16-alpine
    container_name: people_db
    restart: always
    environment:
      POSTGRES_DB: people_registry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d people_registry"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: production
    container_name: people_api
    restart: always
    init: true
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/people_registry
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env}
      PORT: 4000
      CORS_ORIGIN: ${APP_URL:-http://localhost:3000}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_API_URL é congelado no build — precisa vir como build arg
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
    container_name: people_app
    restart: always
    init: true
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api

volumes:
  postgres_data:
    name: people_registry_postgres_data
