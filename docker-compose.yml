services:
  postgres:
    image: postgres:16-alpine
    container_name: people_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: people_registry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d people_registry"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    container_name: people_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/people_registry
      JWT_SECRET: super-secret-jwt-key-change-in-production-32chars
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: development
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate dev --name init 2>/dev/null || npx prisma migrate deploy && npm run dev"

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: people_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  postgres_data:
    name: people_registry_postgres_data
